<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flipbook</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/jquery.min.js"></script>
    <script src="js/turn.min.js"></script>
</head>
<body>

<div class="book-container">
    <div id="flipbook"></div>
</div>

<script>
$(document).ready(function () {

    const totalPages = 8;

    for (let i = 1; i <= totalPages; i++) {
        $("#flipbook").append(
            '<div class="page"><img src="pages/' + i + '.jpg" /></div>'
        );
    }

    $("#flipbook").turn({
        width: 900,
        height: 600,
        autoCenter: true
    });

});
</script>

</body>
</html>
